name: CI - SensorFlow Backend 

on: 
 push:
  branches: [main]

 pulll_request: 
  branches: [main]

jobs:
 test:
  runs-on: ubuntu-latest

  services: 
   postgres: 
    image: postgres:15
    env:
     POSTGRES_USER: sensorflow
     POSTGRES_PASSWORD: sensorflow
     POSTGRES_DB: sensorflow 

    ports:
     -5432:5432
    options: >-
      --health-cmd pg_isready
      --health-interval 5s
      --health-timeout 5s
      --health-retries 5

  steps:
   - name: Checkout code 
     uses: actions/checkout@v4
     with:
      python-version: "3.11"
   - name: Install dependencies
     run: |
      cd backend
      pip install -r requirements.txt

   - name: Run Tests
     env: 
      DATABASE_URL: postgresql://sensorflow:sensorflow@localhost:5432/sensorflow
      SECRET_KEY: 09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
     run: |
          cd backend
          pytest tests/ -v




